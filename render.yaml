# Render Configuration for Th7media
# This file tells Render how to build and deploy your Flask app

services:
  - type: web
    name: th7media
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
